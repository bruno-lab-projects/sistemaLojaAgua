name: Build do Aplicativo para Windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Baixar o código fonte
      uses: actions/checkout@v4

    - name: Configurar o Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Fazer o Build (Compilar e Gerar o JAR com tudo dentro)
      run: mvn -f distribuidora-agua/pom.xml clean package -Djavafx.platform=win

    - name: Preparar pasta de entrega
      run: |
        mkdir EntregaWindows
        copy "distribuidora-agua\target\distribuidora-agua-1.1-SNAPSHOT.jar" "EntregaWindows\SistemaLoja.jar"
        copy "Executavel-Sistema-Loja\INICIAR.bat" "EntregaWindows\"

    - name: Disponibilizar para Download (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: Sistema-Loja-Windows
        path: EntregaWindows/
